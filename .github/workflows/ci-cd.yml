name: Logistics Stack CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Test the Go Logistics Application
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          
      - name: Run Go Unit Tests
        run: |
          cd go-logistics-app
          go test -v ./...

  # 2. Build Docker Images (Only on merge to main/master)
  build-images:
    needs: test-go
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Go App Image
        run: docker build -t logistics-go-app:latest ./go-logistics-app

      - name: Build Backend Image
        run: docker build -t logichat-backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t logichat-frontend:latest ./frontend
